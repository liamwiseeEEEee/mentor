<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova · Thumbnail</title>
<!-- ============================================================
 * THUMBNAIL FRAME — a ready-to-screenshot 1280×720 YouTube
 * thumbnail for the Nova AI-avatar video. Open this file, then
 * screenshot the framed area (it's exactly 1280×720). The real
 * Three.js Nova crystal renders on the left.
 *
 * Swap the headline by editing .kicker / .headline / .sub below.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #02030a; display: grid; place-items: center; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }

.frame {
  position: relative; width: 1280px; height: 720px; overflow: hidden;
  background:
    radial-gradient(50% 55% at 32% 46%, rgba(80,120,255,0.22), transparent 60%),
    radial-gradient(42% 45% at 70% 24%, rgba(190,80,255,0.18), transparent 65%),
    radial-gradient(40% 50% at 80% 90%, rgba(103,232,249,0.12), transparent 60%),
    #04050d;
  isolation: isolate;
}
/* faint grain/vignette to add depth */
.frame::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  box-shadow: inset 0 0 220px rgba(0,0,0,0.85);
}

/* ---- left: the live crystal ---- */
.stage { position: absolute; left: -40px; top: 50%; transform: translateY(-50%); width: 720px; height: 720px; }
#scene { width: 720px; height: 720px; display: block; }

/* floating animation chips around Nova */
.chip {
  position: absolute; z-index: 3;
  font-family: ui-monospace, monospace; font-size: 16px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: #eafcff; padding: 9px 16px; border-radius: 999px;
  border: 1px solid rgba(167,139,250,0.5); background: rgba(13,10,30,0.6);
  backdrop-filter: blur(6px); box-shadow: 0 0 26px rgba(103,232,249,0.25);
}
.chip.c1 { left: 70px;  top: 120px; color: #67e8f9; }
.chip.c2 { left: 470px; top: 92px;  color: #a78bfa; }
.chip.c3 { left: 36px;  top: 470px; color: #f0abfc; }
.chip.c4 { left: 430px; top: 540px; color: #6ee7b7; }

/* ---- right: the copy ---- */
.copy { position: absolute; right: 56px; top: 50%; transform: translateY(-50%); width: 560px; z-index: 4; text-align: left; }
.kicker {
  display: inline-block; font-family: ui-monospace, monospace; font-size: 19px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase; color: #05060c;
  background: linear-gradient(135deg, #67e8f9, #a78bfa 55%, #f0abfc);
  padding: 8px 16px; border-radius: 8px; margin-bottom: 22px;
  box-shadow: 0 0 30px rgba(167,139,250,0.6);
}
.headline {
  font-weight: 900; font-size: 96px; line-height: 0.94; letter-spacing: -0.02em; color: #ffffff;
  text-shadow: 0 6px 40px rgba(0,0,0,0.6);
}
.headline .grad {
  background: linear-gradient(95deg, #67e8f9, #a78bfa 55%, #f0abfc);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
}
.sub {
  margin-top: 26px; font-size: 27px; font-weight: 600; color: #cfd6ea; line-height: 1.3;
}
.sub b { color: #6ee7b7; }
.wordmark {
  position: absolute; left: 60px; bottom: 40px; z-index: 4;
  font-family: ui-monospace, monospace; font-size: 18px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(233,236,245,0.6);
}
.wordmark b { color: #a78bfa; }
</style>
</head>
<body>
  <div class="frame">
    <div class="stage"><canvas id="scene"></canvas></div>

    <div class="chip c1">Float ✦</div>
    <div class="chip c2">Glow ✦</div>
    <div class="chip c3">Wink ✦</div>
    <div class="chip c4">Heartbeat ✦</div>

    <div class="copy">
      <span class="kicker">Built with Claude Code</span>
      <div class="headline">I CODED AN <span class="grad">AI&nbsp;AVATAR</span></div>
      <div class="sub">3D companion · 15 animations · <b>copy-paste, free</b></div>
    </div>

    <div class="wordmark"><b>Vitality</b> · Nova kit</div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
  import * as THREE from 'three'
  const CYAN = new THREE.Color('#67E8F9'), VIOLET = new THREE.Color('#A78BFA'), PINK = new THREE.Color('#F0ABFC')
  const canvas = document.getElementById('scene')
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true })
  renderer.setClearColor(0x000000, 0); renderer.setPixelRatio(Math.min(devicePixelRatio, 2)); renderer.setSize(720, 720, false)
  renderer.outputColorSpace = THREE.SRGBColorSpace
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.18

  const scene = new THREE.Scene()
  const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100)
  camera.position.set(0, 0.1, 5.0); camera.lookAt(0, 0, 0)

  // gradient env for the iridescent glass
  const c = document.createElement('canvas'); c.width = c.height = 64
  const x = c.getContext('2d'); const g = x.createLinearGradient(0, 0, 0, 64)
  g.addColorStop(0, '#0a1030'); g.addColorStop(0.5, '#243a8a'); g.addColorStop(0.75, '#7a4adf'); g.addColorStop(1, '#f0abfc')
  x.fillStyle = g; x.fillRect(0, 0, 64, 64)
  const tex = new THREE.CanvasTexture(c); tex.mapping = THREE.EquirectangularReflectionMapping
  const pm = new THREE.PMREMGenerator(renderer); scene.environment = pm.fromEquirectangular(tex).texture
  tex.dispose(); pm.dispose()

  const avatar = new THREE.Group(); scene.add(avatar)
  const core = new THREE.Mesh(
    new THREE.OctahedronGeometry(1.2, 0),
    new THREE.MeshPhysicalMaterial({
      color: new THREE.Color('#dfe8ff'), metalness: 0, roughness: 0.06,
      transmission: 0.9, thickness: 2.0, ior: 1.6, clearcoat: 1, clearcoatRoughness: 0.1,
      iridescence: 1, iridescenceIOR: 1.6, iridescenceThicknessRange: [120, 520],
      attenuationColor: VIOLET.clone(), attenuationDistance: 2.4, envMapIntensity: 1.5,
    })
  )
  avatar.add(core)
  const glow = new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32),
    new THREE.MeshBasicMaterial({ color: VIOLET, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending }))
  avatar.add(glow)

  // happy face baked to a canvas texture
  const fc = document.createElement('canvas'); fc.width = fc.height = 256
  const fx = fc.getContext('2d'); const faceTex = new THREE.CanvasTexture(fc)
  fx.strokeStyle = '#eafcff'; fx.fillStyle = '#eafcff'; fx.lineCap = 'round'; fx.lineJoin = 'round'
  fx.shadowColor = '#a78bfa'; fx.shadowBlur = 20; fx.lineWidth = 13
  // left eye = happy arc, right eye = wink (closed line) → a friendly wink
  fx.beginPath(); fx.ellipse(86, 116, 26, 22, 0, Math.PI * 1.05, Math.PI * 1.95); fx.stroke()
  fx.beginPath(); fx.ellipse(170, 110, 24, 2, 0, 0, Math.PI * 2); fx.stroke()
  fx.lineWidth = 10; fx.beginPath(); fx.arc(128, 158, 30, Math.PI * 0.12, Math.PI * 0.88); fx.stroke()
  faceTex.needsUpdate = true
  const face = new THREE.Mesh(new THREE.PlaneGeometry(1.05, 1.05),
    new THREE.MeshBasicMaterial({ map: faceTex, transparent: true, opacity: 0.98, depthTest: false, depthWrite: false }))
  face.position.set(0, 0, 1.26); face.renderOrder = 999; avatar.add(face)

  // halo particles
  const N = 90, pPos = new Float32Array(N * 3)
  for (let i = 0; i < N; i++) {
    const r = 2.0 + Math.random() * 1.0, t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1)
    pPos[i*3] = r*Math.sin(p)*Math.cos(t); pPos[i*3+1] = r*Math.cos(p)*0.6; pPos[i*3+2] = r*Math.sin(p)*Math.sin(t)
  }
  const pGeo = new THREE.BufferGeometry(); pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3))
  const halo = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: CYAN, size: 0.035, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false }))
  avatar.add(halo)

  scene.add(Object.assign(new THREE.DirectionalLight(CYAN, 2.4), { position: new THREE.Vector3(2, 3, 4) }))
  scene.add(Object.assign(new THREE.DirectionalLight(VIOLET, 1.9), { position: new THREE.Vector3(-3, 1, -2) }))
  scene.add(Object.assign(new THREE.PointLight(PINK, 6, 12), { position: new THREE.Vector3(0, -2, 2) }))
  scene.add(new THREE.AmbientLight(0x223066, 0.6))

  // pose it at a flattering 3/4 angle and idle-rotate gently
  avatar.rotation.set(0.12, -0.5, 0)
  const clock = new THREE.Clock()
  function frame() {
    requestAnimationFrame(frame)
    const t = clock.getElapsedTime()
    core.rotation.y = -0.5 + Math.sin(t * 0.3) * 0.18; core.rotation.x = 0.12 + Math.sin(t * 0.5) * 0.12
    core.scale.setScalar(1 + Math.sin(t * 1.3) * 0.02)
    glow.material.opacity = 0.5 + Math.sin(t * 1.3) * 0.1
    halo.rotation.y = t * 0.07
    renderer.render(scene, camera)
  }
  frame()
  </script>
</body>
</html>
